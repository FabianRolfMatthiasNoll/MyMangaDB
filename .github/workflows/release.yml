name: Release

on:
  workflow_dispatch:
    inputs:
      force-patch:
        description: "Force a patch bump (e.g. for dependency updates)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Prepare forced patch bump
        if: inputs.force-patch == true
        run: |
          git config user.name "CI Release Bot"
          git config user.email "release@ci.local"
          git commit --allow-empty -m "fix:force patch release"
          git push

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Revert forced patch commit
        if: inputs.force-patch == true
        run: |
          git revert HEAD --no-edit
          git push
